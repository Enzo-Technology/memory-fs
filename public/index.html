<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memory-fs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: #1a1a1a;
    background: #f5f5f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #ddd;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  #status-bar {
    font-size: 12px;
    color: #888;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ---- Left panel ---- */
  #left {
    width: 340px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #controls {
    padding: 12px;
    border-bottom: 1px solid #eee;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #controls label {
    font-size: 12px;
    color: #555;
    font-weight: 500;
  }

  .control-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .control-row label {
    flex-shrink: 0;
    width: 64px;
  }

  select, input[type="text"] {
    font-family: inherit;
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    color: #1a1a1a;
    flex: 1;
  }

  select:focus, input[type="text"]:focus {
    outline: none;
    border-color: #0071e3;
  }

  button {
    font-family: inherit;
    font-size: 13px;
    padding: 4px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    white-space: nowrap;
  }

  button:hover { background: #f0f0f0; }
  button:active { background: #e8e8e8; }

  button.primary {
    background: #0071e3;
    color: #fff;
    border-color: #0071e3;
  }
  button.primary:hover { background: #005bbf; }

  button.danger {
    color: #c0392b;
    border-color: #e0b8b8;
  }
  button.danger:hover { background: #fff0f0; }

  #list-header {
    padding: 8px 12px;
    font-size: 12px;
    color: #888;
    border-bottom: 1px solid #eee;
    background: #fafafa;
    flex-shrink: 0;
  }

  #list {
    overflow-y: auto;
    flex: 1;
  }

  .list-item {
    padding: 9px 12px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    user-select: none;
  }

  .list-item:hover { background: #f7f7f7; }
  .list-item.selected { background: #e8f0fd; }

  .list-item .item-key {
    font-weight: 500;
    font-size: 13px;
    word-break: break-all;
  }

  .list-item .item-meta {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .list-item .in-degree {
    display: inline-block;
    background: #e8f0fd;
    color: #0071e3;
    border-radius: 10px;
    padding: 0 6px;
    font-size: 11px;
    margin-left: 4px;
  }

  .tag-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 12px;
    border-bottom: 1px solid #f0f0f0;
  }

  .tag-item .tag-name {
    font-family: monospace;
    font-size: 12px;
    color: #555;
  }

  .tag-item .tag-count {
    font-size: 12px;
    color: #888;
    background: #f0f0f0;
    padding: 1px 7px;
    border-radius: 10px;
  }

  /* section headings in index view */
  .section-heading {
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    background: #fafafa;
    border-bottom: 1px solid #eee;
  }

  /* ---- Right panel ---- */
  #right {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    background: #fff;
  }

  #empty-state {
    color: #aaa;
    font-size: 14px;
    margin-top: 60px;
    text-align: center;
  }

  #detail { display: none; }

  #detail-heading {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }

  #detail-title {
    flex: 1;
  }

  #detail-ns {
    font-size: 12px;
    color: #888;
    margin-bottom: 2px;
  }

  #detail-key {
    font-size: 18px;
    font-weight: 600;
    word-break: break-all;
  }

  #detail-actions {
    flex-shrink: 0;
    display: flex;
    gap: 6px;
  }

  .meta-table {
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 13px;
  }

  .meta-table td {
    padding: 3px 12px 3px 0;
    vertical-align: top;
  }

  .meta-table td:first-child {
    font-weight: 500;
    color: #555;
    white-space: nowrap;
    padding-right: 16px;
  }

  .tag-pill {
    display: inline-block;
    background: #f0f0f0;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 12px;
    font-family: monospace;
    margin-right: 4px;
  }

  #content-section {
    margin-bottom: 20px;
  }

  #content-section h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 8px;
  }

  #content-pre {
    background: #f8f8f8;
    border: 1px solid #e8e8e8;
    border-radius: 4px;
    padding: 12px;
    font-family: "SF Mono", "Menlo", "Monaco", monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 480px;
    overflow-y: auto;
  }

  #backlinks-section h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 8px;
  }

  .backlink-row {
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .backlink-row a {
    color: #0071e3;
    text-decoration: none;
    cursor: pointer;
  }

  .backlink-row a:hover { text-decoration: underline; }

  .backlink-relation {
    font-size: 11px;
    color: #aaa;
    font-style: italic;
  }

  .no-items {
    color: #aaa;
    font-size: 13px;
    padding: 12px 0;
  }

  #force-delete-wrapper { margin-top: 10px; display: none; }

  #error-msg {
    background: #fff4f4;
    border: 1px solid #f0c0c0;
    border-radius: 4px;
    padding: 8px 12px;
    color: #c0392b;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .spinner {
    color: #aaa;
    font-size: 13px;
    padding: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>memory-fs</h1>
  <span id="status-bar"></span>
</header>

<div class="main">
  <!-- Left panel -->
  <div id="left">
    <div id="controls">
      <div class="control-row">
        <label for="kind-select">View</label>
        <select id="kind-select">
          <option value="recent" selected>Recent</option>
          <option value="index">Index</option>
          <option value="hubs">Hubs</option>
          <option value="orphans">Orphans</option>
          <option value="tags">Tags</option>
        </select>
      </div>
      <div class="control-row">
        <label for="ns-input">Namespace</label>
        <input type="text" id="ns-input" placeholder="(any)" autocomplete="off" spellcheck="false">
      </div>
      <div class="control-row">
        <label for="prefix-input">Prefix</label>
        <input type="text" id="prefix-input" placeholder="(any)" autocomplete="off" spellcheck="false">
      </div>
      <div class="control-row" style="justify-content: flex-end;">
        <button id="refresh-btn" class="primary">Refresh</button>
      </div>
    </div>
    <div id="list-header"></div>
    <div id="list"><div class="spinner">Loading...</div></div>
  </div>

  <!-- Right panel -->
  <div id="right">
    <div id="empty-state">Select a memory from the list to view it.</div>
    <div id="detail">
      <div id="detail-heading">
        <div id="detail-title">
          <div id="detail-ns"></div>
          <div id="detail-key"></div>
        </div>
        <div id="detail-actions">
          <button id="delete-btn" class="danger">Delete</button>
        </div>
      </div>

      <table class="meta-table">
        <tr>
          <td>Type</td>
          <td id="detail-type"></td>
        </tr>
        <tr>
          <td>Tags</td>
          <td id="detail-tags"></td>
        </tr>
        <tr>
          <td>Created</td>
          <td id="detail-created"></td>
        </tr>
        <tr>
          <td>Updated</td>
          <td id="detail-updated"></td>
        </tr>
      </table>

      <div id="error-msg"></div>
      <div id="force-delete-wrapper">
        <button id="force-delete-btn" class="danger">Delete anyway (force)</button>
      </div>

      <div id="content-section">
        <h3>Content</h3>
        <pre id="content-pre"></pre>
      </div>

      <div id="backlinks-section">
        <h3>Backlinks</h3>
        <div id="backlinks-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function setStatus(msg) {
  document.getElementById("status-bar").textContent = msg;
}

async function apiFetch(url, opts) {
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) {
    throw new Error(data.error ?? `HTTP ${res.status}`);
  }
  return data;
}

function formatDate(iso) {
  if (!iso) return "";
  // ISO 8601 from SQLite: "2024-01-15 12:34:56"
  return iso.replace("T", " ").replace(/\.\d+Z?$/, "");
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

let currentSelection = null; // { namespace, key }

// ---------------------------------------------------------------------------
// Left panel: browse
// ---------------------------------------------------------------------------

function buildBrowseUrl() {
  const kind = document.getElementById("kind-select").value;
  const ns = document.getElementById("ns-input").value.trim();
  const prefix = document.getElementById("prefix-input").value.trim();
  const params = new URLSearchParams({ kind });
  if (ns) params.set("namespace", ns);
  if (prefix) params.set("prefix", prefix);
  return `/api/browse?${params}`;
}

async function loadList() {
  const listEl = document.getElementById("list");
  const headerEl = document.getElementById("list-header");
  listEl.innerHTML = '<div class="spinner">Loading...</div>';
  headerEl.textContent = "";

  let data;
  try {
    data = await apiFetch(buildBrowseUrl());
  } catch (e) {
    listEl.innerHTML = `<div class="no-items" style="padding:12px;color:#c0392b;">${esc(e.message)}</div>`;
    return;
  }

  headerEl.textContent = `${data.total ?? 0} total`;

  const kind = data.kind;
  const fragment = document.createDocumentFragment();

  if (kind === "index") {
    renderIndex(data, fragment);
  } else if (kind === "tags") {
    renderTags(data.items, fragment);
  } else {
    // recent, hubs, orphans
    renderMemoryItems(data.items, kind === "hubs", fragment);
  }

  listEl.innerHTML = "";
  listEl.appendChild(fragment);

  // Re-highlight selected item if still present
  if (currentSelection) {
    highlightSelected(currentSelection.namespace, currentSelection.key);
  }
}

function renderIndex(data, container) {
  for (const section of data.items) {
    const heading = document.createElement("div");
    heading.className = "section-heading";
    heading.textContent = section.section;
    container.appendChild(heading);

    if (section.section === "tags") {
      renderTags(section.items, container);
    } else {
      renderMemoryItems(section.items, section.section === "hubs", container);
    }
  }
}

function renderMemoryItems(items, showInDegree, container) {
  if (!items || items.length === 0) {
    const el = document.createElement("div");
    el.className = "no-items";
    el.style.padding = "12px";
    el.textContent = "No items.";
    container.appendChild(el);
    return;
  }
  for (const item of items) {
    const el = document.createElement("div");
    el.className = "list-item";
    el.dataset.namespace = item.namespace;
    el.dataset.key = item.key;

    const keyEl = document.createElement("div");
    keyEl.className = "item-key";
    keyEl.textContent = item.key;
    el.appendChild(keyEl);

    const metaEl = document.createElement("div");
    metaEl.className = "item-meta";

    let metaText = item.namespace;
    if (item.type) metaText += " · " + item.type;
    if (item.updated_at) metaText += " · " + formatDate(item.updated_at);
    metaEl.textContent = metaText;

    if (showInDegree && item.in_degree != null) {
      const badge = document.createElement("span");
      badge.className = "in-degree";
      badge.textContent = item.in_degree + " in";
      keyEl.appendChild(badge);
    }

    el.appendChild(metaEl);

    el.addEventListener("click", () => selectMemory(item.namespace, item.key));
    container.appendChild(el);
  }
}

function renderTags(items, container) {
  if (!items || items.length === 0) {
    const el = document.createElement("div");
    el.className = "no-items";
    el.style.padding = "12px";
    el.textContent = "No tags.";
    container.appendChild(el);
    return;
  }
  for (const item of items) {
    const el = document.createElement("div");
    el.className = "tag-item";

    const nameEl = document.createElement("span");
    nameEl.className = "tag-name";
    nameEl.textContent = item.tag;
    el.appendChild(nameEl);

    const countEl = document.createElement("span");
    countEl.className = "tag-count";
    countEl.textContent = String(item.count);
    el.appendChild(countEl);

    container.appendChild(el);
  }
}

function highlightSelected(namespace, key) {
  document.querySelectorAll(".list-item.selected").forEach((el) => {
    el.classList.remove("selected");
  });
  document.querySelectorAll(".list-item").forEach((el) => {
    if (el.dataset.namespace === namespace && el.dataset.key === key) {
      el.classList.add("selected");
    }
  });
}

// ---------------------------------------------------------------------------
// Right panel: detail
// ---------------------------------------------------------------------------

async function selectMemory(namespace, key) {
  currentSelection = { namespace, key };
  highlightSelected(namespace, key);
  clearError();
  document.getElementById("force-delete-wrapper").style.display = "none";

  const emptyState = document.getElementById("empty-state");
  const detail = document.getElementById("detail");
  emptyState.style.display = "none";
  detail.style.display = "none";

  setStatus("Loading...");
  let memory;
  try {
    memory = await apiFetch(`/api/read?namespace=${encodeURIComponent(namespace)}&key=${encodeURIComponent(key)}`);
  } catch (e) {
    setStatus("Error: " + e.message);
    emptyState.textContent = "Error loading memory: " + e.message;
    emptyState.style.display = "block";
    return;
  }

  if (memory.found === false) {
    setStatus("");
    emptyState.textContent = memory.hint ?? "Memory not found.";
    emptyState.style.display = "block";
    return;
  }

  renderDetail(memory);
  detail.style.display = "block";
  setStatus("");

  // Load backlinks in parallel (non-blocking display)
  loadBacklinks(namespace, key);
}

function renderDetail(memory) {
  document.getElementById("detail-ns").textContent = memory.namespace;
  document.getElementById("detail-key").textContent = memory.key;
  document.getElementById("detail-type").textContent = memory.type ?? "";
  document.getElementById("detail-created").textContent = formatDate(memory.created_at);
  document.getElementById("detail-updated").textContent = formatDate(memory.updated_at);

  // Tags
  const tagsEl = document.getElementById("detail-tags");
  tagsEl.innerHTML = "";
  if (Array.isArray(memory.tags) && memory.tags.length > 0) {
    for (const tag of memory.tags) {
      const pill = document.createElement("span");
      pill.className = "tag-pill";
      pill.textContent = tag;
      tagsEl.appendChild(pill);
    }
  } else {
    tagsEl.textContent = "(none)";
  }

  // Content: use textContent to prevent injection
  document.getElementById("content-pre").textContent = memory.content ?? "";
}

async function loadBacklinks(namespace, key) {
  const listEl = document.getElementById("backlinks-list");
  listEl.innerHTML = '<span class="spinner">Loading...</span>';

  let items;
  try {
    items = await apiFetch(`/api/backlinks?namespace=${encodeURIComponent(namespace)}&key=${encodeURIComponent(key)}`);
  } catch (e) {
    listEl.textContent = "Error loading backlinks: " + e.message;
    return;
  }

  listEl.innerHTML = "";

  if (!Array.isArray(items) || items.length === 0) {
    const el = document.createElement("div");
    el.className = "no-items";
    el.textContent = "No backlinks.";
    listEl.appendChild(el);
    return;
  }

  for (const bl of items) {
    const row = document.createElement("div");
    row.className = "backlink-row";

    const link = document.createElement("a");
    link.textContent = bl.from_namespace + "/" + bl.from_key;
    link.addEventListener("click", (e) => {
      e.preventDefault();
      selectMemory(bl.from_namespace, bl.from_key);
    });
    row.appendChild(link);

    if (bl.relation) {
      const rel = document.createElement("span");
      rel.className = "backlink-relation";
      rel.textContent = bl.relation;
      row.appendChild(rel);
    }

    listEl.appendChild(row);
  }
}

// ---------------------------------------------------------------------------
// Delete flow
// ---------------------------------------------------------------------------

function clearError() {
  const errEl = document.getElementById("error-msg");
  errEl.style.display = "none";
  errEl.textContent = "";
}

function showError(msg) {
  const errEl = document.getElementById("error-msg");
  errEl.textContent = msg;
  errEl.style.display = "block";
}

async function deleteMemory(force) {
  if (!currentSelection) return;
  const { namespace, key } = currentSelection;

  if (!force) {
    if (!window.confirm(`Delete ${namespace}/${key}?`)) return;
  }

  clearError();
  setStatus("Deleting...");

  let result;
  try {
    result = await apiFetch("/api/delete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ namespace, key, force: !!force }),
    });
  } catch (e) {
    setStatus("");
    showError("Delete failed: " + e.message);
    return;
  }

  setStatus("");

  if (result.error) {
    showError(result.error);
    if (/backlink/i.test(result.error)) {
      document.getElementById("force-delete-wrapper").style.display = "block";
    }
    return;
  }

  // Success: clear detail pane and refresh list
  currentSelection = null;
  document.getElementById("detail").style.display = "none";
  const emptyState = document.getElementById("empty-state");
  emptyState.textContent = `Deleted ${namespace}/${key}.`;
  emptyState.style.display = "block";
  document.getElementById("force-delete-wrapper").style.display = "none";
  await loadList();
}

// ---------------------------------------------------------------------------
// Wire up events
// ---------------------------------------------------------------------------

document.getElementById("refresh-btn").addEventListener("click", loadList);
document.getElementById("kind-select").addEventListener("change", loadList);

document.getElementById("delete-btn").addEventListener("click", () => deleteMemory(false));
document.getElementById("force-delete-btn").addEventListener("click", () => deleteMemory(true));

// Initial load
loadList();
</script>
</body>
</html>
